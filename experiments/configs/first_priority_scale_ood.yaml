experiment_name: first_priority_scale_ood_rl_region_lbbd
experiment_scope: "the Scale-OOD first-priority synthetic matrix"
output_root: experiments/results
device: cuda
seeds: [20260518, 20260519, 20260520, 20260521, 20260522]

defaults:
  data:
    train_instances: 24
    val_instances: 8
    test_instances: 12
    train_job_range: [6, 8]
    test_job_range: [9, 11]
    machines: 4
    ops_per_job: [3, 5]
    flexibility_choices: [2, 3]
    duration_range: [2, 10]
    due_date_factor: 1.45
    disturbance:
      reschedule_fraction: 0.45
      breakdown_duration_fraction: [0.08, 0.18]
      inflation_probability: 0.2
      inflation_range: [1.2, 1.7]
  solver:
    max_iterations: 5
    region_radii: [2, 4, 6]
    subproblem_time_limit_sec: 0.2
    threads: 8
    objective_weights:
      makespan: 1.0
      tardiness: 1.0
      start_deviation: 0.15
      machine_reassignment: 0.3

scenarios:
  - name: scale_ood_small_to_medium
  - name: scale_ood_medium_to_large
    data:
      train_job_range: [9, 11]
      test_job_range: [12, 14]
      machines: 5
      ops_per_job: [4, 6]
      flexibility_choices: [2, 3, 4]
      duration_range: [2, 12]
      due_date_factor: 1.5
    solver:
      subproblem_time_limit_sec: 0.25
      region_radii: [3, 5, 7]

fixed_methods:
  - full_reschedule
  - plain_lbbd
  - critical_path_lbbd
  - random_region_lbbd

learned_methods:
  - name: bc_oracle_lbbd
    family: learning
    type: bc
    training:
      epochs: 12
      batch_size: 32
      learning_rate: 0.0005
      max_examples: 256
  - name: rl_guided_lbbd
    family: learning
    type: ppo
    fallback_method: plain_lbbd
    imitation_pretrain:
      teacher: heuristic
      epochs: 8
      batch_size: 32
      learning_rate: 0.0005
      max_examples: 256
    training:
      epochs: 10
      episodes_per_epoch: 8
      gamma: 0.99
      gae_lambda: 0.95
      clip_ratio: 0.2
      policy_lr: 0.0003
      value_lr: 0.0003
      entropy_coef: 0.01
      value_coef: 0.5
      max_grad_norm: 1.0
      ppo_epochs: 4
      minibatch_size: 32
  - name: rl_no_radius_lbbd
    family: ablation
    type: ppo
    region_radii: [4]
    imitation_pretrain:
      teacher: heuristic
      epochs: 8
      batch_size: 32
      learning_rate: 0.0005
      max_examples: 256
    training:
      epochs: 10
      episodes_per_epoch: 8
      gamma: 0.99
      gae_lambda: 0.95
      clip_ratio: 0.2
      policy_lr: 0.0003
      value_lr: 0.0003
      entropy_coef: 0.01
      value_coef: 0.5
      max_grad_norm: 1.0
      ppo_epochs: 4
      minibatch_size: 32
  - name: rl_sparse_reward_lbbd
    family: ablation
    type: ppo
    reward_config:
      step_penalty: 0.0
      infeasible_penalty: 0.0
      elapsed_penalty: 0.0
      accepted_bonus: 0.0
      rejected_penalty: 0.0
    imitation_pretrain:
      teacher: heuristic
      epochs: 8
      batch_size: 32
      learning_rate: 0.0005
      max_examples: 256
    training:
      epochs: 10
      episodes_per_epoch: 8
      gamma: 0.99
      gae_lambda: 0.95
      clip_ratio: 0.2
      policy_lr: 0.0003
      value_lr: 0.0003
      entropy_coef: 0.01
      value_coef: 0.5
      max_grad_norm: 1.0
      ppo_epochs: 4
      minibatch_size: 32

known_risks:
  - Public benchmark and Disturbance-OOD blocks are deferred from this Scale-OOD run.
  - Scale-OOD is synthetic generator extrapolation, not family-level benchmark transfer.
  - The full-reschedule reference remains a greedy disturbed reschedule, not a global exact recomputation.

deviations:
  - This slice completes Scale-OOD synthetic evaluation only; public benchmarks remain out of scope.
  - "The learning baseline set is intentionally compact: PPO RL plus oracle behavior cloning."
  - Confidence intervals are bootstrap CIs over executed runs; paired significance testing is not implemented in this first-priority runner yet.

next_steps:
  - Compare Scale-OOD results against the completed ID matrix.
  - Add Disturbance-OOD and a public benchmark subset.
  - Replace the greedy full_reschedule reference with a true global CP-SAT recomputation baseline.
